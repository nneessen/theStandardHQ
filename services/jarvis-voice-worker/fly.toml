# Fly config for the Jarvis voice worker.
# It connects OUT to LiveKit Cloud (persistent WebSocket) and serves NO public HTTP — so
# there is intentionally no [http_service]. It must NOT scale to zero (a stopped worker =
# no voice), so keep ≥1 machine running: `fly scale count 1` (raise for concurrency).
app = "standardhq-jarvis-voice"
primary_region = "iad" # set to the region nearest your users / LiveKit project

[build]

[env]
  NODE_ENV = "production"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb" # headroom for the VAD / turn-detection models + per-room inference

# Keep the worker resident — no auto-stop for an outbound, stateful agent process.
[experimental]
  auto_rollback = true
