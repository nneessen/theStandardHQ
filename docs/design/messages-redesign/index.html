<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Messages — Open-Message Redesign Options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   "Standard HQ" board tokens — mirrored verbatim from
   src/components/board/tokens.ts so these mockups preview the
   REAL app design language (Archivo / Space Mono / Hanken).
   ============================================================ */
:root{
  --s1:#171717; --s2:#1e1e1e; --s3:#252525; --s4:#2c2c2c;
  --s5:#333333; --s6:#3a3a3a; --s7:#414141; --s8:#484848;
  --head1:#202020; --head2:#1b1b1b;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14); --line3:rgba(255,255,255,.28);
  --ink:#f3f3f4; --cream:#fbfbfc;
  --mut:rgba(255,255,255,.62); --mut2:rgba(255,255,255,.42); --mut3:rgba(255,255,255,.28);
  --blue:#5b9bff; --blueLit:#82bcff; --blue06:rgba(91,155,255,.06); --blue10:rgba(91,155,255,.10);
  --blue16:rgba(91,155,255,.16); --blue22:rgba(91,155,255,.22); --blue30:rgba(91,155,255,.30);
  --violet:#b69bff; --violet16:rgba(182,155,255,.16); --violet30:rgba(182,155,255,.30);
  --green:#5fd08a; --green20:rgba(95,208,138,.20);
  --amber:#f4b43a; --amber20:rgba(244,180,58,.20);
  --red:#ff6a5d; --red20:rgba(255,106,93,.18);
  --disp:'Archivo',system-ui,sans-serif;
  --mono:'Space Mono',monospace;
  --data:'Hanken Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--s1);color:var(--ink);font-family:var(--data);-webkit-font-smoothing:antialiased}
button{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Control deck (mockup chrome, not part of the app) ---------- */
.deck{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#141414,#101010);
  border-bottom:1px solid var(--line2);padding:12px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.deck .brand{display:flex;flex-direction:column;gap:2px}
.deck .brand .eye{font:700 10px var(--mono);letter-spacing:.22em;color:var(--mut2);text-transform:uppercase}
.deck .brand .ttl{font:800 16px var(--disp);color:var(--cream);text-transform:uppercase;letter-spacing:.02em}
.seg{display:inline-flex;background:var(--s2);border:1px solid var(--line2);border-radius:11px;padding:3px;gap:2px}
.seg button{appearance:none;border:none;background:transparent;color:var(--mut);cursor:pointer;
  font:700 12.5px var(--data);padding:8px 13px;border-radius:8px;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.seg button .n{font:700 10px var(--mono);opacity:.7}
.seg button:hover{color:var(--ink)}
.seg button.on{background:var(--blue16);color:var(--blueLit);box-shadow:inset 0 0 0 1px var(--blue30)}
.seg.ig button.on{background:var(--violet16);color:var(--violet);box-shadow:inset 0 0 0 1px var(--violet30)}
.deck .spacer{flex:1}
.deck .hint{font:500 12px var(--data);color:var(--mut2);max-width:min(46ch,40vw);line-height:1.45}
.deck .hint b{color:var(--mut);font-weight:700}
.chanwrap{display:flex;align-items:center;gap:9px}
.chanwrap .lbl{font:700 10px var(--mono);letter-spacing:.16em;color:var(--mut3);text-transform:uppercase}

/* ---------- App frame ---------- */
.stage{padding:18px 22px 30px}
.app{height:calc(100vh - 132px);min-height:560px;display:flex;flex-direction:column;gap:12px}

/* ---------- Page header (.mh) ---------- */
.mh{background:linear-gradient(180deg,var(--head1),var(--head2));border-bottom:1px solid var(--line);
  border-radius:12px;overflow:hidden;flex-shrink:0}
.mh-top{display:flex;align-items:center;gap:22px;padding:18px 24px 14px;flex-wrap:wrap}
.mh-logo{width:42px;height:42px;border-radius:12px;background:var(--blue16);box-shadow:inset 0 0 0 1px var(--blue30);
  color:var(--blue);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.mh-eye{font:700 11px var(--mono);letter-spacing:.22em;color:var(--mut2);text-transform:uppercase}
.mh-h1{font:800 26px var(--disp);color:var(--cream);text-transform:uppercase;margin:0;line-height:1.05}
.mh-stats{margin-left:auto;display:flex;align-items:stretch;flex-wrap:wrap}
.stat{padding:2px 20px;border-left:1px solid var(--line)}
.stat:first-child{border-left:none}
.stat .v{font:800 23px var(--disp);line-height:1.1;font-variant-numeric:tabular-nums}
.stat .l{font:700 10px var(--mono);letter-spacing:.16em;color:var(--mut2);text-transform:uppercase}
.meter{height:7px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;display:flex}
.meter i{display:block;height:100%}
.mh-bar{display:flex;align-items:center;height:52px;border-top:1px solid var(--line);padding:0 24px;gap:4px}
.tab{position:relative;display:inline-flex;align-items:center;gap:7px;padding:0 14px;height:100%;
  background:transparent;border:none;cursor:pointer;color:var(--mut);font:600 13px var(--data);white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--ink);font-weight:700}
.tab .u{position:absolute;left:8px;right:8px;bottom:-1px;height:2px;border-radius:2px;background:var(--blue)}
.tab.on.ig .u{background:var(--violet)}
.tab .bdg{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;
  border-radius:999px;font:700 10px var(--mono);background:rgba(255,255,255,.08);color:var(--mut)}
.tab.on .bdg{background:var(--blue16);color:var(--blueLit)}
.tab .newpip{font:700 8px var(--mono);letter-spacing:.12em;color:var(--green);background:var(--green20);
  padding:2px 4px;border-radius:4px;text-transform:uppercase}
.search{position:relative;width:280px;max-width:34vw}
.search input{width:100%;height:38px;padding:0 40px 0 33px;border-radius:10px;background:var(--s3);
  border:1px solid var(--line2);color:var(--ink);font:500 13px var(--data);outline:none}
.search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mut2)}
.search .kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font:700 10px var(--mono);
  color:var(--mut2);border:1px solid var(--line2);border-radius:5px;padding:1px 5px}
.compose{display:inline-flex;align-items:center;gap:7px;margin-left:10px;height:38px;padding:0 16px;border-radius:10px;
  background:var(--cream);color:#141414;font:700 13px var(--data);cursor:pointer;border:none;box-shadow:0 2px 10px rgba(0,0,0,.35)}

/* ---------- Body grid ---------- */
.body{flex:1;min-height:0;display:flex;gap:12px}
.col{background:var(--s2);border:1px solid var(--line);border-radius:12px;min-height:0;display:flex;flex-direction:column;overflow:hidden}

/* ---------- Folder rail (NEW) ---------- */
.rail{width:236px;flex-shrink:0;padding:14px 12px;overflow-y:auto}
.rail .newbadge{font:700 8px var(--mono);letter-spacing:.14em;color:var(--green);background:var(--green20);
  padding:2px 6px;border-radius:5px;text-transform:uppercase;margin-left:7px}
.rail .grp{font:700 10px var(--mono);letter-spacing:.18em;color:var(--mut3);text-transform:uppercase;
  padding:14px 10px 7px;display:flex;align-items:center}
.rail .grp:first-child{padding-top:2px}
.fitem{display:flex;align-items:center;gap:10px;height:34px;padding:0 10px;border-radius:9px;color:var(--mut);
  font:600 13px var(--data);cursor:pointer;border:1px solid transparent}
.fitem:hover{background:rgba(255,255,255,.05);color:var(--ink)}
.fitem.on{background:var(--blue10);border-color:var(--blue22);color:var(--ink)}
.fitem.on.igc{background:var(--violet16);border-color:var(--violet30)}
.fitem svg{flex-shrink:0;opacity:.85}
.fitem .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fitem .ct{font:700 11px var(--mono);color:var(--mut2)}
.fitem.on .ct{color:var(--blueLit)}
.fitem .dot{width:9px;height:9px;border-radius:99px;flex-shrink:0}

/* ---------- Feed ---------- */
.feed{flex:1;min-width:0;overflow-y:auto}
.feed.narrow{flex:none;width:368px}
.feed-inner{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.feedtools{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.chip{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 12px;border-radius:8px;
  background:rgba(255,255,255,.06);border:1px solid var(--line2);color:var(--mut);font:700 12.5px var(--data);cursor:pointer}
.chip.on{background:var(--blue16);border-color:var(--blue30);color:var(--blueLit)}
.chip .ct{font:700 10px var(--mono)}
.daydiv{display:flex;align-items:center;gap:12px;margin:4px 0 0}
.daydiv span.l{font:700 10px var(--mono);letter-spacing:.16em;color:var(--mut3);text-transform:uppercase}
.daydiv span.r{flex:1;height:1px;background:var(--line)}
.fcard{padding:16px 18px;border-radius:14px;background:var(--s2);border:1px solid var(--line);cursor:pointer;
  transition:background .12s,border-color .12s;display:flex;flex-direction:column;gap:8px}
.fcard:hover{background:#262626;border-color:var(--line2)}
.fcard.unread{background:var(--blue06);border-color:var(--blue22)}
.fcard.sel{background:var(--blue10);border-color:var(--blue30);box-shadow:inset 0 0 0 1px var(--blue22)}
.fc-row{display:flex;align-items:center;gap:9px;min-width:0}
.glyph{width:24px;height:24px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.glyph.em{background:var(--blue16);color:var(--blue)}
.glyph.ig{background:var(--violet16);color:var(--violet)}
.udot{width:7px;height:7px;border-radius:99px;background:var(--blue);flex-shrink:0}
.fc-name{font:800 15px var(--disp);color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46%;flex-shrink:0}
.fc-addr{font:600 12.5px var(--data);color:var(--mut2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.fc-time{font:600 12px var(--data);color:var(--mut2);flex-shrink:0}
.fc-subj{font:700 14.5px var(--data);color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-prev{font:500 13.5px/1.5 var(--data);color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ltag{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 9px;border-radius:7px;font:700 10.5px var(--data)}
.ltag .d{width:6px;height:6px;border-radius:99px}
.recv{display:inline-flex;align-items:center;gap:5px;font:600 11px var(--data);color:var(--mut2)}
.fup{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 9px;border-radius:7px;font:700 10.5px var(--data);
  background:var(--amber20);color:var(--amber)}
.qr{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 11px;border-radius:8px;background:var(--s2);
  border:1px solid var(--line2);color:var(--ink);font:600 12px var(--data);cursor:pointer}

/* ---------- Thread detail (board-restyled — replaces the zinc ThreadView) ---------- */
.detail{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.dt-head{flex-shrink:0;padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:14px}
.dt-eye{font:700 10px var(--mono);letter-spacing:.18em;color:var(--mut2);text-transform:uppercase;margin-bottom:6px}
.dt-subj{font:800 18px var(--disp);color:var(--ink);margin:0;line-height:1.18}
.dt-meta{display:flex;align-items:center;gap:10px;margin-top:7px;flex-wrap:wrap}
.dt-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.iconbtn{width:32px;height:32px;border-radius:9px;background:var(--s3);border:1px solid var(--line2);color:var(--mut);
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn:hover{color:var(--ink);border-color:var(--line3)}
.iconbtn.amber{color:var(--amber)}
.thread{flex:1;min-height:0;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:12px}
.thread.wide{align-items:center}
.thread.wide .msg,.thread.wide .collapsed,.thread.wide .composer{width:100%;max-width:860px}
.collapsed{align-self:center;font:600 11px var(--mono);letter-spacing:.04em;color:var(--mut3);text-transform:uppercase;
  padding:4px 0;cursor:pointer}
.msg{border:1px solid var(--line);border-radius:13px;background:var(--s3);overflow:hidden}
.msg.sent{background:var(--blue06);border-color:var(--blue22)}
.msg-h{display:flex;align-items:center;gap:11px;padding:13px 16px}
.msg-h.exp{border-bottom:1px solid var(--line)}
.av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
  font:800 11px var(--disp);color:var(--ink)}
.av.me{background:var(--blue16);color:var(--blueLit);box-shadow:inset 0 0 0 1px var(--blue30)}
.av.them{background:var(--s5);color:var(--ink)}
.msg-nm{font:700 13.5px var(--data);color:var(--ink)}
.sbadge{display:inline-flex;align-items:center;gap:4px;height:18px;padding:0 6px;border-radius:6px;
  font:700 9.5px var(--data);background:var(--blue16);color:var(--blueLit)}
.msg-time{font:600 11.5px var(--data);color:var(--mut2)}
.msg-meta{padding:10px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--line);
  display:flex;flex-direction:column;gap:3px}
.msg-meta .r{display:flex;gap:8px;font:500 11px var(--data);color:var(--mut2)}
.msg-meta .r b{font:700 11px var(--mono);letter-spacing:.04em;color:var(--mut3);text-transform:uppercase;min-width:38px;display:inline-block}
.msg-body{padding:16px;font:500 13.5px/1.72 var(--data);color:var(--ink)}
.msg-body p{margin:0 0 12px}
.msg-body p:last-child{margin-bottom:0}
.msg-body .sig{color:var(--mut2);font-size:12.5px}
.msg-body b{color:var(--cream)}
.attach{margin:0 16px 16px;display:inline-flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;
  background:var(--s4);border:1px solid var(--line2);color:var(--ink);font:600 12px var(--data);cursor:pointer}
.attach .sz{color:var(--mut2);font-weight:500}
.recpt{display:inline-flex;align-items:center;gap:5px;font:600 11px var(--data);color:var(--mut2)}

/* composer */
.composer{flex-shrink:0;margin:0;border-top:1px solid var(--line);padding:14px 22px;background:var(--s2)}
.composer.boxed{border:1px solid var(--line2);border-radius:13px;background:var(--s3);margin-top:4px;padding:0}
.cx-field{padding:13px 15px;color:var(--mut2);font:500 13px var(--data)}
.cx-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
.btn{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 14px;border-radius:9px;border:1px solid var(--line2);
  background:rgba(255,255,255,.05);color:var(--ink);font:700 12.5px var(--data);cursor:pointer}
.btn.cream{background:var(--cream);color:#141414;border-color:transparent}
.btn.blue{background:var(--blue);color:#0c1730;border-color:transparent}
.btn.violet{background:var(--violet);color:#1a0f33;border-color:transparent}
.btn.ghost{background:transparent;color:var(--mut)}

/* ---------- Instagram conversation ---------- */
.igav{width:32px;height:32px;border-radius:99px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
  font:800 11px var(--disp);color:#fff;background:linear-gradient(135deg,#8a3ab9,#e95950 55%,#fccc63)}
.igwin{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 9px;border-radius:99px;
  font:700 10px var(--mono);letter-spacing:.04em;background:var(--amber20);color:var(--amber)}
.igchip{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 9px;border-radius:7px;font:700 10px var(--data)}
.bubbles{flex:1;min-height:0;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:7px}
.bubbles.wide{align-items:center}
.bubbles.wide .brow,.bubbles.wide .datesep{width:100%;max-width:720px}
.datesep{display:flex;align-items:center;gap:12px;margin:8px 0}
.datesep .l{font:700 9.5px var(--mono);letter-spacing:.14em;color:var(--mut3);text-transform:uppercase}
.datesep .r{flex:1;height:1px;background:var(--line)}
.brow{display:flex}
.brow.out{justify-content:flex-end}
.bub{max-width:72%;padding:10px 14px;border-radius:16px;font:500 13.5px/1.5 var(--data)}
.bub.in{background:var(--s4);color:var(--ink);border-bottom-left-radius:5px}
.bub.out{background:var(--violet16);border:1px solid var(--violet30);color:var(--ink);border-bottom-right-radius:5px}
.btime{font:600 10px var(--data);color:var(--mut3);margin:1px 6px 3px;align-self:flex-end}
.brow.in + .btime{align-self:flex-start}

/* ---------- Modal pattern ---------- */
.scrim{position:absolute;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);z-index:40;
  display:flex;align-items:center;justify-content:center;border-radius:12px}
.modalcard{width:min(940px,92%);height:min(86%,760px);background:var(--s2);border:1px solid var(--line2);
  border-radius:16px;box-shadow:0 30px 90px rgba(0,0,0,.6);overflow:hidden;display:flex;flex-direction:column}
.modalcard .dt-head{background:linear-gradient(180deg,var(--head1),var(--head2))}
.relwrap{position:relative;flex:1;min-height:0;display:flex}

/* ---------- Templates view (restyled) ---------- */
.tpl-body{flex:1;min-height:0;display:flex;gap:12px}
.tpl-cats{width:230px;flex-shrink:0;padding:14px 12px;overflow-y:auto}
.tpl-cat{display:flex;align-items:center;gap:10px;height:34px;padding:0 11px;border-radius:9px;color:var(--mut);
  font:600 13px var(--data);cursor:pointer;border:1px solid transparent}
.tpl-cat:hover{background:rgba(255,255,255,.05);color:var(--ink)}
.tpl-cat.on{background:var(--violet16);border-color:var(--violet30);color:var(--ink)}
.tpl-cat .ct{margin-left:auto;font:700 11px var(--mono);color:var(--mut2)}
.tpl-main{flex:1;min-width:0;overflow-y:auto;padding:16px 18px}
.tpl-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.tpl-head .h{font:800 16px var(--disp);color:var(--cream);text-transform:uppercase}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.tcard{background:var(--s3);border:1px solid var(--line);border-radius:13px;padding:15px 16px;display:flex;flex-direction:column;gap:10px;cursor:pointer}
.tcard:hover{border-color:var(--line2);background:#272727}
.tcard .top{display:flex;align-items:center;gap:9px}
.tcard .nm{font:800 14px var(--disp);color:var(--cream)}
.tcard .cat{margin-left:auto;font:700 9.5px var(--data);padding:3px 8px;border-radius:6px;background:var(--violet16);color:var(--violet)}
.tcard .prev{font:500 12.5px/1.6 var(--data);color:var(--mut);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tcard .prev v{color:var(--blueLit);font-weight:600}
.tcard .meta{display:flex;align-items:center;gap:12px;padding-top:4px;border-top:1px solid var(--line)}
.tcard .meta .m{font:600 11px var(--data);color:var(--mut2);display:inline-flex;align-items:center;gap:5px}
.tcard .meta .use{margin-left:auto;display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 11px;border-radius:8px;
  background:var(--violet16);border:1px solid var(--violet30);color:var(--violet);font:700 11.5px var(--data)}

.hidden{display:none!important}
.note{font:500 12px var(--data);color:var(--mut2);padding:0 2px}
</style>
</head>
<body>

<div class="deck">
  <div class="brand">
    <span class="eye">Communications · Redesign</span>
    <span class="ttl">Open a message</span>
  </div>

  <div class="seg" id="patternSeg">
    <button data-p="reading" class="on"><span class="n">1</span> Reading pane</button>
    <button data-p="fullpage"><span class="n">2</span> Full page</button>
    <button data-p="modal"><span class="n">3</span> Centered modal</button>
    <button data-p="templates"><span class="n">4</span> Templates</button>
  </div>

  <div class="chanwrap" id="chanWrap">
    <span class="lbl">Show</span>
    <div class="seg" id="chanSeg">
      <button data-c="email" class="on">Email thread</button>
      <button data-c="ig">Instagram DM</button>
    </div>

        <span style="flex:1;color:var(--mut2);font:500 13px var(--data)">Message @marcus_deals…</span>
        <button class="btn ghost" style="height:30px" title="Template">${ic('file',13)}</button>
        <button class="btn ghost" style="height:30px" title="Schedule">${ic('clock',13)}</button>
        <button class="btn violet" style="height:32px">${ic('send',13)} Send</button>
      </div>
    </div>`;
  return {head,scroll:`<div class="bubbles ${wide?'wide':''}">${bubbles}</div>`,composer};
}

function detailFor(channel,opts){return channel==='ig'?igThread(opts):emailThread(opts);}

/* ---------- pattern assemblers ---------- */
function viewReading(channel){
  const d=detailFor(channel,{closer:true});
  const selId=channel==='ig'?'ig1':'em1';
  return header(channel==='ig'?'instagram':'all')+`<div class="body">${rail(channel)}${feed(selId,true)}
    <div class="col detail">${d.head}${d.scroll}${d.composer}</div></div>`;
}
function viewFull(channel){
  const d=detailFor(channel,{wide:true,closer:false});
  const back=`<div class="dt-head" style="padding-bottom:0;border:none">
     <button class="btn ghost" style="height:30px;margin-bottom:2px">${ic('chevLeft',14)} Back to ${channel==='ig'?'Instagram':'All inboxes'}</button></div>`;
  return header(channel==='ig'?'instagram':'all')+`<div class="body">${rail(channel)}
    <div class="col detail">${back}${d.head}${d.scroll}${d.composer}</div></div>`;
}
function viewModal(channel){
  const d=detailFor(channel,{closer:true});
  const selId=channel==='ig'?'ig1':'em1';
  const inbox=`<div class="body" style="position:relative">${rail(channel)}${feed(selId,false)}
    <div class="scrim">
      <div class="modalcard">${d.head}<div class="relwrap"><div class="col detail" style="border:none;border-radius:0">${d.scroll}${d.composer}</div></div></div>
    </div></div>`;
  return header(channel==='ig'?'instagram':'all')+inbox;
}
function viewTemplates(){
  const cats=TPL_CATS.map(c=>`<div class="tpl-cat ${c.on?'on':''}">${ic('file',15)}<span>${c.n}</span><span class="ct">${c.ct}</span></div>`).join('');
  const cards=TPLS.map(t=>{
    const body=t.body.replace(/\{\{(.*?)\}\}/g,'<v>{{$1}}</v>');
    return `<div class="tcard">
      <div class="top"><span class="nm">${t.n}</span><span class="cat">${t.cat}</span></div>
      <div class="prev">${body}</div>
      <div class="meta">
        <span class="m">${ic('zap',12)} Used ${t.used}×</span>
        <span class="m">${ic('clock',12)} ${t.edited}</span>
        <span class="use">${ic('send',12)} Use</span>
      </div>
    </div>`;
  }).join('');
  return header('templates')+`<div class="body">
    <div class="col tpl-cats">
      <button class="compose" style="width:100%;justify-content:center;margin:0 0 12px;background:var(--violet);color:#1a0f33">${ic('plus',15)} New template</button>
      <div class="grp" style="font:700 10px var(--mono);letter-spacing:.18em;color:var(--mut3);text-transform:uppercase;padding:6px 10px">Categories</div>
      ${cats}
    </div>
    <div class="col tpl-main">
      <div class="tpl-head"><span class="h">All templates</span><span class="note">22 templates · variables auto-fill from the contact</span><span style="flex:1"></span><span class="chip">Most used</span></div>
      <div class="tpl-grid">${cards}</div>
    </div>
  </div>`;
}

/* ---------- render + wiring ---------- */
function render(){
  const app=document.getElementById('app');
  const p=state.pattern, c=state.channel;
  document.getElementById('hint').innerHTML=HINTS[p];
  document.getElementById('chanWrap').classList.toggle('hidden',p==='templates');
  if(p==='templates') app.innerHTML=viewTemplates();
  else if(p==='fullpage') app.innerHTML=viewFull(c);
  else if(p==='modal') app.innerHTML=viewModal(c);
  else app.innerHTML=viewReading(c);
}
document.querySelectorAll('#patternSeg button').forEach(b=>b.addEventListener('click',()=>{
  state.pattern=b.dataset.p;
  document.querySelectorAll('#patternSeg button').forEach(x=>x.classList.toggle('on',x===b));
  render();
}));
document.querySelectorAll('#chanSeg button').forEach(b=>b.addEventListener('click',()=>{
  state.channel=b.dataset.c;
  document.getElementById('chanSeg').classList.toggle('ig',state.channel==='ig');
  document.querySelectorAll('#chanSeg button').forEach(x=>x.classList.toggle('on',x===b));
  render();
}));
render();
</script>
</body>
</html>
