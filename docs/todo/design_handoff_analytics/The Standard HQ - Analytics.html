<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Standard HQ — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#120f08; --panel:#19140b; --panel2:#1d1810; --tile:#221b10;
    --line:rgba(236,226,205,0.10); --line2:rgba(236,226,205,0.18);
    --ink:#f1e9d6; --cream:#ece2cd; --mut:rgba(236,226,205,0.55); --mut2:rgba(236,226,205,0.36);
    --blue:#5b9bff; --cyan:#46d8f5; --amber:#f4b43a; --red:#ff6a5d; --green:#5fd08a;
    --disp:"Archivo",system-ui,sans-serif; --body:"Hanken Grotesk",system-ui,sans-serif; --mono:"Space Mono",monospace;
    --rail:84px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{background:var(--bg); background-image:repeating-linear-gradient(90deg, rgba(255,255,255,0.014) 0 1px, transparent 1px 3px);
    color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased; min-height:100vh;}
  .shell{display:flex; min-height:100vh;}

  .rail{width:var(--rail); flex-shrink:0; position:sticky; top:0; align-self:flex-start; height:100vh;
    display:flex; flex-direction:column; align-items:center; gap:5px; padding:18px 0 20px;
    background:linear-gradient(180deg,var(--panel2),var(--panel)); border-right:1px solid var(--line2); z-index:10;}
  .rail-burger{width:46px; height:46px; border-radius:12px; display:grid; place-items:center; color:var(--mut);
    border:1px solid var(--line); background:rgba(0,0,0,0.25); cursor:pointer; margin-bottom:6px;}
  .rail-avatar{width:54px; height:54px; border-radius:50%; display:grid; place-items:center;
    background:radial-gradient(circle at 35% 30%, rgba(70,216,245,0.18), rgba(70,216,245,0.02));
    border:1px solid rgba(70,216,245,0.4); box-shadow:0 0 18px rgba(70,216,245,0.16); color:var(--cyan); margin-bottom:10px;}
  .rail-icons{display:flex; flex-direction:column; align-items:center; gap:3px; flex:1;}
  .rail-btn{width:50px; height:50px; border-radius:13px; display:grid; place-items:center; color:var(--mut); cursor:pointer; transition:.15s;}
  .rail-btn:hover{color:var(--ink); background:rgba(236,226,205,0.06);}
  .rail-btn.active{color:var(--blue); background:rgba(91,155,255,0.12); box-shadow:inset 0 0 0 1px rgba(91,155,255,0.4), 0 0 16px rgba(91,155,255,0.12);}
  .rail-sep{width:36px; height:1px; background:var(--line2); margin:9px 0;}
  .rail-btn.logout{color:var(--red);}

  .content{flex:1; min-width:0; padding:40px 48px 64px; max-width:1820px;}
  .g3{display:grid; grid-template-columns:repeat(3,1fr); gap:24px; align-items:stretch; margin-bottom:24px;}
  .g2{display:grid; grid-template-columns:repeat(2,1fr); gap:24px; align-items:stretch; margin-bottom:24px;}
  .cell{min-width:0;} .cell.sp2{grid-column:span 2;}
  .cell>.panel{height:100%;}
  .stack{display:grid; gap:24px; align-content:start; min-width:0;}
</style>
</head>
<body>
<div class="shell">
  <nav class="rail">
    <div class="rail-burger"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></div>
    <div class="rail-avatar"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 2a9 9 0 0 0-9 9c0 3 1 5 1 7m16-7a9 9 0 0 0-5-8M12 6a5 5 0 0 0-5 5c0 2 .5 3 .5 5m9-10a5 5 0 0 1 1.5 6M12 10a1.5 1.5 0 0 0-1.5 1.5c0 1 0 2 .5 4"/></svg></div>
    <div class="rail-icons">
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 1.9 4.3L18 8l-3 3 .7 4.5L12 13l-3.7 2.5L9 11 6 8l4.1-.7L12 3Z"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m3 10 9-7 9 7v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M9 21v-7h6v7"/></svg></div>
      <div class="rail-btn active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 17 6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h9l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M14 3v6h6"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 11h20"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 19v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="3.2"/><path d="M22 19v-2a4 4 0 0 0-3-3.8"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4a2 2 0 0 1-2-2V5h4M18 9h2a2 2 0 0 0 2-2V5h-4M6 5h12v4a6 6 0 0 1-12 0Z"/><path d="M9 19h6M12 15v4"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7L22 6"/></svg></div>
      <div class="rail-sep"></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7Z"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8M4.6 9a1.6 1.6 0 0 0-.3-1.8"/></svg></div>
      <div class="rail-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.5-3 4M12 17h.01"/></svg></div>
    </div>
    <div class="rail-btn logout"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></div>
  </nav>

  <main class="content acx" id="root"></main>
</div>

<script src="analytics-charts.js"></script>
<script src="analytics-data.js"></script>
<script src="analytics-panels.js"></script>
<script>
  document.getElementById('root').innerHTML =
      P.header('Lead with the verdict — are you on pace — then the plan, then the detail.')
    + P.heroBand()
    + `<div class="g2"><div class="cell">${P.trendPanel()}</div><div class="cell">${P.growthPanel()}</div></div>`
    + `<div class="g3"><div class="cell">${P.actionFeed()}</div><div class="cell sp2">${P.agentsPanel()}</div></div>`
    + `<div class="g3"><div class="cell">${P.funnelPanel()}</div><div class="cell">${P.segmentsPanel()}</div><div class="cell">${P.pipelinePanel()}</div></div>`
    + `<div class="g3"><div class="cell sp2">${P.sparkTrends()}</div><div class="stack">${P.productsPanel()}${P.statesPanel()}</div></div>`
    + P.footer();
  AC.init(document.getElementById('root'));
</script>
</body>
</html>
