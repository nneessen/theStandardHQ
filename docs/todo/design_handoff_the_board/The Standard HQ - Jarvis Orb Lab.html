<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Standard HQ — Jarvis Orb Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root { --cy: #4ad8f5; --ink: #dff3fa; --mut: rgba(223,243,250,0.5); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #000; color: var(--ink); font-family: "Archivo", system-ui, sans-serif; }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 44px 36px 90px; }
  .ey { font-family: "Space Mono", monospace; font-size: 11px; letter-spacing: 0.28em; color: var(--cy); text-transform: uppercase; margin-bottom: 12px; }
  h1 { font-size: 40px; font-weight: 800; letter-spacing: 0.02em; margin: 0; }
  .sub { color: var(--mut); font-size: 15px; max-width: 600px; line-height: 1.5; margin: 12px 0 34px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 22px; }
  .card { position: relative; border: 1px solid rgba(74,216,245,0.16); border-radius: 14px; overflow: hidden;
    background: #000; transition: border-color .2s, transform .2s, box-shadow .2s; cursor: pointer; }
  .card:hover { border-color: rgba(74,216,245,0.5); transform: translateY(-3px); box-shadow: 0 18px 50px rgba(0,0,0,0.6), 0 0 30px rgba(74,216,245,0.12); }
  .card.sel { border-color: var(--cy); box-shadow: 0 0 0 1px var(--cy), 0 0 40px rgba(74,216,245,0.25); }
  .core { width: 100%; height: 300px; position: relative; background: radial-gradient(120% 120% at 50% 45%, #04121a 0%, #000 70%); }
  .brk { position: absolute; width: 14px; height: 14px; border: 1.5px solid rgba(74,216,245,0.4); pointer-events: none; z-index: 2; }
  .brk.tl { top: 9px; left: 9px; border-right: 0; border-bottom: 0; }
  .brk.tr { top: 9px; right: 9px; border-left: 0; border-bottom: 0; }
  .meta { padding: 14px 16px 16px; border-top: 1px solid rgba(74,216,245,0.12); display: flex; align-items: center; justify-content: space-between; gap: 12px; position: relative; z-index: 2; background: rgba(2,5,7,0.6); }
  .name { font-weight: 800; font-size: 16px; letter-spacing: 0.02em; }
  .desc { font-size: 12px; color: var(--mut); margin-top: 3px; }
  .tag { font-family: "Space Mono", monospace; font-size: 9.5px; letter-spacing: 0.1em; color: var(--cy); border: 1px solid rgba(74,216,245,0.3); border-radius: 5px; padding: 5px 8px; white-space: nowrap; flex-shrink: 0; }
  .selnote { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(6,14,18,0.92); border: 1px solid rgba(74,216,245,0.35); border-radius: 999px; padding: 11px 20px; font-family: "Space Mono", monospace; font-size: 12px; color: var(--ink); backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.6); opacity: 0; transition: opacity .25s; }
  .selnote.on { opacity: 1; } .selnote b { color: var(--cy); }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#000"/>
    <circle cx="50" cy="50" r="26" fill="none" stroke="#4ad8f5" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="50" cy="50" r="14" fill="none" stroke="#b6f3ff" stroke-width="1"/>
    <circle cx="50" cy="50" r="4" fill="#d6f7ff"/>
  </svg>
</template>

<div class="wrap">
  <div class="ey">The Standard HQ · Energy Orb Variations</div>
  <h1>Jarvis Orb — Six Takes</h1>
  <div class="sub">All built from the Energy Orb you liked, rebuilt as pure energy — points, filaments, and a real fresnel shader. No solid background spheres anywhere. Click one to mark it; I'll wire the winner into the dashboard as a draggable Jarvis.</div>
  <div class="grid" id="grid"></div>
</div>
<div class="selnote" id="selnote"></div>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="directions/jarvisOrbs.js"></script>
<script>
  const ORBS = [
    ['plasma', 'Plasma Sphere',  'Displaced points, hot core bleeding to cyan rim', 'WEBGL · POINTS'],
    ['bubble', 'Fresnel Bubble', 'Edge-lit energy shell (GLSL) with inner field',   'WEBGL · SHADER'],
    ['web',    'Filament Lattice','Living wireframe web + glowing nodes',            'WEBGL · LINES'],
    ['twin',   'Twin Shells',    'Two counter-rotating point shells, layered depth', 'WEBGL · POINTS'],
    ['storm',  'Ion Storm',      '1,100 particles churning in a contained sphere',   'WEBGL · PARTICLES'],
    ['gyro',   'Gyro Rings',     'Gyroscopic energy rings around a pulsing core',     'WEBGL · LINES'],
  ];
  const grid = document.getElementById('grid'), note = document.getElementById('selnote');
  ORBS.forEach(([fn, name, desc, tag]) => {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="core" data-orb="${fn}"></div>
      <span class="brk tl"></span><span class="brk tr"></span>
      <div class="meta"><div><div class="name">${name}</div><div class="desc">${desc}</div></div><div class="tag">${tag}</div></div>`;
    card.addEventListener('click', () => { document.querySelectorAll('.card').forEach(c => c.classList.remove('sel')); card.classList.add('sel'); note.innerHTML = `Favorite: <b>${name}</b> — say the word and I'll make it your draggable Jarvis`; note.classList.add('on'); });
    grid.appendChild(card);
  });
  document.querySelectorAll('[data-orb]').forEach(el => { const fn = el.getAttribute('data-orb'); try { window.JarvisOrb[fn](el); } catch (e) { console.error('orb failed', fn, e); } });
</script>
</body>
</html>
