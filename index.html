<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="logos/LetterLogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Commission tracking application for insurance agents"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts: original families (public pages) + Archivo/Hanken Grotesk/Space
         Mono ("The Board" authenticated app). Single source of truth. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800;900&family=Big+Shoulders+Display:wght@300;400;500;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Spotlight / Social Studio display fonts (Agent-of-the-Week designs +
         the customizer font dropdown). Loaded in the APP — not just the render
         harness — so the in-app preview AND the html-to-image download embed
         the real glyphs instead of a system fallback. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800;900&family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap"
      rel="stylesheet"
    />
    <!-- Fontshare families (Clash Display / Satoshi / General Sans) — SELF-HOSTED so they
         render identically in the live preview AND embed in the Social Studio PNG export
         (Fontshare's CDN CSS isn't fetch-CORS-readable, so it can't be inlined at export
         time). Files + this CSS are generated into /public/fonts. -->
    <link rel="stylesheet" href="/fonts/fontshare.css" />
    <title>The Standard HQ</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
